<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Post | PSIDO</title>
  <link rel="icon" type="image/png" href="psido-logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Clean Blog Reading Styles */
    .blog-content p {
      margin-bottom: 1.5rem;
      font-size: 1.1rem;
      line-height: 1.8;
      color: var(--muted);
    }
    .blog-content h2 {
      margin-top: 3rem;
      margin-bottom: 1.5rem;
      font-size: 1.8rem;
      color: var(--foreground);
    }
    .blog-content h3 {
      margin-top: 2rem;
      margin-bottom: 1rem;
      font-size: 1.4rem;
      color: var(--foreground);
    }
    .blog-content ul, .blog-content ol {
      margin-bottom: 2rem;
      padding-left: 1.5rem;
      color: var(--muted);
      line-height: 1.8;
    }
    .blog-content li {
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body data-page="blog">

  <!-- Custom Cursor -->
  <div id="cursor" class="custom-cursor"></div>
  <div id="cursor-ring" class="custom-cursor-ring"></div>

  <!-- Navbar -->
  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo-link">
        <img src="psido-logo.png" alt="PSIDO Wolf Logo" class="logo-img">
        <span class="logo-text">PSIDO</span>
      </a>
      <nav>
        <ul class="nav-menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="portfolio.html">Portfolio</a></li>
          <li><a href="industries.html">Industries</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a href="blog.html" class="active">Blog</a></li>
        </ul>
      </nav>
      <div class="nav-cta">
        <a href="contact.html" class="btn-premium">
          <span>Start Project</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
        </a>
      </div>
    </div>
  </header>

  <main style="padding-top: 150px; padding-bottom: 5rem; min-height: 100vh;">
    <div class="container reveal-on-scroll" style="max-width: 800px; margin: 0 auto;">
      
      <a href="blog.html" style="color: var(--primary); font-size: 0.9rem; font-weight: 700; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 2rem;">
        &larr; Back to Articles
      </a>

      <div id="template-meta" style="color: var(--primary); font-size: 0.85rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 1rem; background: rgba(37, 99, 235, 0.1); display: inline-block; padding: 0.4rem 1rem; border-radius: 50px;">
        <!-- JS fills meta (Category & Date) -->
      </div>

      <h1 id="template-title" style="font-size: clamp(2rem, 4vw, 3.5rem); line-height: 1.2; margin-bottom: 2rem; color: var(--foreground); font-weight: 800;">
        <!-- JS fills title -->
      </h1>

      <div id="template-image-container">
        <!-- JS fills image -->
      </div>

      <div id="template-body" class="blog-content" style="margin-top: 3rem;">
        <!-- JS fills content -->
      </div>

      <div style="margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
        <span style="color: var(--muted); font-size: 0.9rem;">Written by PSIDO Editorial Team</span>
        <a href="blog.html" class="btn-premium" style="padding: 0.5rem 1rem;">Read More Articles</a>
      </div>

    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
