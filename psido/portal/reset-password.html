<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reset Password | Psido Employee Portal</title>
<link rel="icon" type="image/png" href="../assets/images/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../css/portal.css">
</head>
<body>
<div class="auth-page" id="resetPage">
  <div class="auth-bg"><div class="auth-orb auth-orb-1"></div><div class="auth-orb auth-orb-2"></div></div>
  <div class="auth-box">
    <div class="auth-logo"><img src="../assets/images/logo.png" alt="Psido"><span>Password Reset</span></div>

    <div id="step1r">
      <h1 class="auth-title">Forgot Password?</h1>
      <p class="auth-subtitle">Enter your registered email to receive a reset OTP</p>
      <form id="resetForm">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-wrap"><i class="fas fa-envelope"></i><input type="email" id="resetEmail" class="form-control" placeholder="you@psido.in" required></div>
        </div>
        <button type="submit" class="btn btn-primary">Send Reset OTP</button>
      </form>
    </div>

    <div id="step2r" style="display:none">
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-subtitle">Enter the OTP and your new password</p>
      <form id="resetForm2">
        <div class="form-group">
          <label class="form-label">OTP Code</label>
          <div class="input-wrap"><i class="fas fa-key"></i><input type="text" id="resetOtp" class="form-control" placeholder="6-digit OTP" required></div>
        </div>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <div class="input-wrap"><i class="fas fa-lock"></i><input type="password" id="resetNewPass" class="form-control" placeholder="Min 8 characters" required></div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <div class="input-wrap"><i class="fas fa-lock"></i><input type="password" id="resetConfPass" class="form-control" placeholder="Repeat password" required></div>
        </div>
        <button type="submit" class="btn btn-primary">Reset Password</button>
      </form>
    </div>

    <p style="text-align:center;margin-top:1.5rem"><a href="login.html" style="font-size:0.85rem;color:var(--primary)"><i class="fas fa-arrow-left"></i> Back to Login</a></p>
  </div>
</div>
<div id="toast" class="toast"></div>
<script src="../js/portal.js"></script>
</body></html>
