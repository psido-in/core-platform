<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case Study | PSIDO</title>
  <link rel="icon" type="image/png" href="psido-logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="portfolio">

  <!-- Custom Cursor -->
  <div id="cursor" class="custom-cursor"></div>
  <div id="cursor-ring" class="custom-cursor-ring"></div>

  <!-- Navbar -->
  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo-link">
        <img src="psido-logo.png" alt="PSIDO Wolf Logo" class="logo-img">
        <span class="logo-text">PSIDO</span>
      </a>
      <nav>
        <ul class="nav-menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="portfolio.html" class="active">Portfolio</a></li>
          <li><a href="industries.html">Industries</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a href="blog.html">Blog</a></li>
        </ul>
      </nav>
      <div class="nav-cta">
        <a href="contact.html" class="btn-premium">
          <span>Start Project</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
        </a>
      </div>
    </div>
  </header>

  <main style="padding-top: 150px; padding-bottom: 5rem; min-height: 100vh;">
    <div class="container reveal-on-scroll" style="max-width: 900px; margin: 0 auto;">
      
      <a href="portfolio.html" style="color: var(--primary); font-size: 0.9rem; font-weight: 700; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 2rem;">
        &larr; Back to Portfolio
      </a>

      <div id="template-meta" style="color: var(--muted); font-size: 0.85rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 1rem;">
        <!-- JS fills meta (Category & Date) -->
      </div>

      <h1 id="template-title" class="text-gradient" style="font-size: clamp(2rem, 4vw, 3.5rem); line-height: 1.1; margin-bottom: 2rem;">
        <!-- JS fills title -->
      </h1>

      <div id="template-image-container">
        <!-- JS fills image -->
      </div>

      <div id="template-body" class="glass-panel" style="padding: 3rem; margin-top: 2rem; font-size: 1.05rem; line-height: 1.8; color: var(--muted);">
        <!-- JS fills content -->
      </div>

    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
