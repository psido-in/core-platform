<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Employee Login | Psido Technologies Portal</title>
<link rel="icon" type="image/png" href="../assets/images/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../css/portal.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-bg"><div class="auth-orb auth-orb-1"></div><div class="auth-orb auth-orb-2"></div></div>
  <div class="auth-box">
    <div class="auth-logo"><img src="../assets/images/logo.png" alt="Psido"><span>Employee Portal</span></div>

    <!-- Step 1: Login -->
    <div id="step1">
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to access your Psido employee dashboard</p>
      <div class="alert alert-error" id="loginError"></div>
      <form id="loginForm" >
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-wrap"><i class="fas fa-envelope"></i><input type="email" id="email" class="form-control" placeholder="you@psido.in" required></div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap"><i class="fas fa-lock"></i><input type="password" id="password" class="form-control" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required></div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
          <label style="display:flex;align-items:center;gap:0.5rem;font-size:0.85rem;color:var(--text-muted);cursor:pointer"><input type="checkbox" style="accent-color:var(--primary)"> Remember me</label>
          <a href="reset-password.html" style="font-size:0.85rem;color:var(--primary)">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary">Sign In <i class="fas fa-arrow-right"></i></button>
      </form>
    </div>

    <!-- Step 2: OTP -->
    <div id="step2" style="display:none">
      <h1 class="auth-title">2-Step Verification</h1>
      <p class="auth-subtitle">Enter the 6-digit OTP sent to your registered email</p>
      <div class="alert alert-info show" id="otpInfo" style="display:block">Check your email for the OTP</div>
      <form id="otpForm" >
        <div class="otp-boxes">
          <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
          <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
          <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
          <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
          <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
          <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
        </div>
        <button type="submit" class="btn btn-primary">Verify OTP</button>
        <p style="text-align:center;margin-top:1rem;font-size:0.85rem;color:var(--text-muted)"><button type="button" onclick="document.getElementById('step2').style.display='none';document.getElementById('step1').style.display='block';" style="background:none;border:none;color:var(--primary);cursor:pointer">â† Back to login</button></p>
      </form>
    </div>

    <div class="auth-divider"><span>or</span></div>
    <p class="auth-footer">Need help? <a href="mailto:enquiry@psido.in">Contact HR</a></p>
    <p style="text-align:center;margin-top:1rem"><a href="../index.html" style="font-size:0.82rem;color:var(--text-muted)"><i class="fas fa-arrow-left"></i> Back to Website</a></p>
  </div>
</div>
<div id="toast" class="toast"></div>
<script src="../js/portal.js"></script>
</body></html>
